name: Generate Hero Variation

on:
  issues:
    types: [labeled]

jobs:
  generate-variation:
    if: contains(github.event.label.name, 'approved')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Generate Hero Variation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: node scripts/syncHeroBase.js
        working-directory: web

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/gallery.json public/assets/gallery/
          git diff --cached --quiet || git commit -m "🎨 Hero variation from issue #${{ github.event.issue.number }}"
          git push

      - name: Close issue with preview
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const gallery = JSON.parse(fs.readFileSync('web/src/data/gallery.json', 'utf8'));
            const latest = gallery[gallery.length - 1];
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **Variation generated!** 🎨\n\n**Hero:** ${latest.hero}\n**Scene:** ${latest.scene}\n**Mood:** ${latest.mood}\n\nThe image has been committed to the repository.`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['hero-variation', 'generated']
            });
